
<div class="mat-elevation-z8">

    <div>
        <button matButton="outlined" (click)="newCustomer()" >Új partner</button>
    </div>
    <div>
        <mat-form-field>
            <mat-label>Minősítés</mat-label>
            <mat-select  multiple (selectionChange)="classChanged($event)">
                @for (class of classification; track class) {
                <mat-option [value]="class">{{class}}</mat-option>
                }
            </mat-select>
        </mat-form-field>
    </div>    
  <table mat-table [dataSource]="partnerService.viewCustomerData()">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Név </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <ng-container matColumnDef="taxNumber">
      <th mat-header-cell *matHeaderCellDef> Adószám </th>
      <td mat-cell *matCellDef="let element"> {{element.taxNumber}} </td>
    </ng-container>

    <ng-container matColumnDef="address">
      <th mat-header-cell *matHeaderCellDef> Cím </th>
      <td mat-cell *matCellDef="let element"> {{element.address}} </td>
    </ng-container>

    <ng-container matColumnDef="classification">
      <th mat-header-cell *matHeaderCellDef> Minősítés </th>
      <td mat-cell *matCellDef="let element"> {{element.classification}} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Státusz </th>
      <td mat-cell *matCellDef="let element"> {{element.status}} </td>
    </ng-container>

    <ng-container matColumnDef="edit">
      <th mat-header-cell *matHeaderCellDef>  </th>
      <td mat-cell *matCellDef="let element">
                <div class="coll edit">
                <button matButton (click)="edit(element)">Modosít</button>
                <button matButton (click)="view(element)">Megnéz</button>
                <button matButton (click)="deleteCustomer(element)">Törlés</button>
            </div>
      </td>
    </ng-container>
    
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
