<mat-dialog-content>
    <div class="form">
        <div style="width: 100%; display: flex;"><mat-label style="min-width: 200px;">Név:</mat-label>  <div>{{data.name}}</div></div>
        <div style="width: 100%; display: flex;"><mat-label style="min-width: 200px;">Adószám:</mat-label>  <div>{{data.taxNumber}}</div></div>
        <div style="width: 100%; display: flex;"><mat-label style="min-width: 200px;">Székhely:</mat-label>  <div>{{data.address}}</div></div>
        <div style="width: 100%; display: flex;"><mat-label style="min-width: 200px;">Státusz:</mat-label>  <div>{{data.status}}</div></div>
        <div style="width: 100%; display: flex;"><mat-label style="min-width: 200px;">Minősítés:</mat-label>  <div>{{data.classification}}</div></div>
    </div>
    <div>
        
        @if(taskList().length > 0){     
        <div>
            Tevékenyésg lista:
        </div>
        <table mat-table [dataSource]="taskList()">
            <ng-container matColumnDef="subject">
            <th mat-header-cell *matHeaderCellDef> Tárgy </th>
            <td mat-cell *matCellDef="let element"> {{element.subject}} </td>
            </ng-container>
            <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef> Típus </th>
            <td mat-cell *matCellDef="let element"> {{element.type}} </td>
            </ng-container>
            <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef> Leírás </th>
            <td mat-cell *matCellDef="let element"> {{element.description}} </td>
            </ng-container>
            <ng-container matColumnDef="time">
            <th mat-header-cell *matHeaderCellDef> Időtartam (perc) </th>
            <td mat-cell *matCellDef="let element"> {{element.time}} </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
   }
    </div>
</mat-dialog-content>
<mat-dialog-actions>
     <button matButton (click)="close()">Bezárás</button>
</mat-dialog-actions>
